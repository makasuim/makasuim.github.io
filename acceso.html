<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GUAU&MIAU - Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="estilos.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>
<body>
    <header class="bg-primary text-white p-3">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="h3">GUAU&MIAU</h1>
            <nav>
                <ul class="nav">
                    <li class="nav-item"><a href="index.html" class="nav-link text-white">Inicio</a></li>
                    <li class="nav-item"><a href="registro.html" class="nav-link text-white">Registro</a></li>
                    <li class="nav-item"><a href="acceso.html" class="nav-link text-white active">Acceso</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container my-5">
        <h2>Inicio de Sesión</h2>
        <form id="formularioAcceso" novalidate class="needs-validation">
            <div class="mb-3">
                <label for="correoAcceso" class="form-label">Correo Electrónico</label>
                <input type="email" class="form-control" id="correoAcceso" name="correoAcceso" required autocomplete="username" />
                <div class="invalid-feedback">Por favor, ingresa tu correo electrónico.</div>
            </div>
            <div class="mb-3">
                <label for="contrasenaAcceso" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="contrasenaAcceso" name="contrasenaAcceso" required autocomplete="current-password" />
                <div class="invalid-feedback">Por favor, ingresa tu contraseña.</div>
            </div>
            <button type="submit" class="btn btn-primary w-100">Iniciar Sesión</button>
            <div class="mt-3 text-center">
                <a href="#" class="text-decoration-none">¿Olvidaste tu contraseña?</a>
            </div>
            <div id="mensajeAcceso" class="mt-3 alert alert-danger d-none" role="alert"></div>
        </form>
    </main>

    <footer class="bg-dark text-white text-center p-3">
        <p>&copy; 2024 GUAU&MIAU.</p>
        <div class="d-flex justify-content-center gap-3 mt-2">
            <a href="https://www.instagram.com" target="_blank" rel="noopener" class="text-white fs-4" aria-label="Instagram">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://www.facebook.com" target="_blank" rel="noopener" class="text-white fs-4" aria-label="Facebook">
                <i class="fab fa-facebook"></i>
            </a>
            <a href="https://www.twitter.com" target="_blank" rel="noopener" class="text-white fs-4" aria-label="Twitter">
                <i class="fab fa-twitter"></i>
            </a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
